<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari V3 — Dashboard</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg:      #0f172a;
  --surface: #1e293b;
  --surface2:#263349;
  --border:  #334155;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --primary: #3b82f6;
  --green:   #22c55e;
  --red:     #ef4444;
  --yellow:  #f59e0b;
  --purple:  #7c3aed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── HEADER ── */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-left h1 { font-size: 1rem; font-weight: 700; }
.live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.header-stats { display: flex; gap: 16px; font-size: .78rem; color: var(--muted); }
.header-stats strong { color: var(--text); }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: .8rem; }
.btn-logout:hover { color: var(--red); border-color: var(--red); }

/* ── LOGIN ── */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 340px; }
.login-card h1 { font-size: 1.4rem; margin-bottom: .3rem; }
.login-card p  { color: var(--muted); font-size: .85rem; margin-bottom: 1.5rem; }
.login-card input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: .9rem; margin-bottom: .75rem; }
.login-card input:focus { outline: 2px solid var(--primary); }
.btn-primary { width: 100%; background: var(--primary); color: #fff; border: none; padding: 10px; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; }
.btn-primary:hover { opacity: .9; }
#login-error { color: var(--red); font-size: .82rem; margin-top: .5rem; text-align: center; }
.pass-wrap { position: relative; }
.pass-wrap input { padding-right: 40px; }
.pass-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; }
.login-hint { margin-top: 1rem; padding: .75rem; background: var(--bg); border-radius: 8px; font-size: .75rem; color: var(--muted); }

/* ── MAIN LAYOUT ── */
#app { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ESQUERDA (lista) ── */
#sidebar { width: 300px; min-width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 10px 12px; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.btn-add { background: var(--primary); color: #fff; border: none; border-radius: 6px; width: 24px; height: 24px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.btn-add:hover { opacity: .85; }
#conv-list { overflow-y: auto; flex: 1; }

/* CARD */
.conv-card { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; border-left: 3px solid transparent; transition: background .15s; }
.conv-card:hover  { background: var(--surface2); }
.conv-card.active { background: var(--surface2); border-left-color: var(--primary); }
@keyframes piscar { 0%,100%{background:var(--surface)}50%{background:#14532d44} }
.conv-card.nova   { animation: piscar .5s ease 4; border-left-color: var(--green); }
.card-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.card-nome { font-size: .88rem; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-tempo { font-size: .72rem; color: var(--muted); white-space: nowrap; margin-left: 6px; }
.card-row2 { font-size: .78rem; color: var(--muted); margin-bottom: 3px; }
.card-row3 { font-size: .74rem; color: #475569; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.card-chip { background: var(--bg); padding: 1px 7px; border-radius: 4px; font-size: .68rem; color: var(--purple); border: 1px solid var(--purple)40; }
.card-actions { display: flex; gap: 4px; margin-top: 5px; padding-top: 5px; border-top: 1px solid var(--border)60; }
.card-btn { flex: 1; background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-size: 13px; padding: 2px 0; cursor: pointer; }
.card-btn:hover { background: var(--surface2); color: var(--text); }
.card-btn.danger:hover { color: var(--red); border-color: var(--red); }
.novo-badge { background: var(--green); color: #000; font-size: .6rem; font-weight: 900; padding: 1px 5px; border-radius: 8px; margin-left: 4px; vertical-align: middle; }

/* ── CHAT CENTRAL ── */
#chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
#chat-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; min-height: 52px; }
.chat-header-info h2 { font-size: .95rem; font-weight: 600; }
.chat-header-info p  { font-size: .75rem; color: var(--muted); }
.chat-header-actions { display: flex; gap: 6px; }
.btn-action { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 7px; font-size: .75rem; cursor: pointer; white-space: nowrap; }
.btn-action:hover { background: var(--border); }
.btn-action.danger { border-color: var(--red)60; color: var(--red); }
.btn-action.danger:hover { background: var(--red)22; }
#chat-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.empty-chat { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: .85rem; gap: 8px; }

/* Mensagens */
.msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: .85rem; line-height: 1.45; }
.msg.user  { align-self: flex-end; background: var(--primary)22; border: 1px solid var(--primary)40; }
.msg.agent { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); }
.msg.supervisor { align-self: flex-start; background: var(--yellow)15; border: 1px solid var(--yellow)40; }
.msg-time { font-size: .65rem; color: var(--muted); margin-top: 2px; text-align: right; }

/* Barra inferior do chat */
#chat-input-bar { border-top: 1px solid var(--border); background: var(--surface); padding: 8px 12px; flex-shrink: 0; }
.chat-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.chat-tab { padding: 4px 12px; font-size: .75rem; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; color: var(--muted); background: none; }
.chat-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.chat-input-row { display: flex; gap: 6px; align-items: flex-end; }
.chat-inp { flex: 1; min-height: 36px; max-height: 80px; resize: none; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: .84rem; font-family: inherit; }
.chat-inp:focus { outline: 2px solid var(--primary); }
.btn-send { padding: 8px 16px; background: var(--primary); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: .84rem; font-weight: 600; white-space: nowrap; }
.btn-send:hover { opacity: .85; }
#fd-preview { display: none; margin-bottom: 6px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--purple)60; border-radius: 8px; font-size: .8rem; color: var(--purple); }
#fd-preview .pre-label { font-size: .7rem; margin-bottom: 3px; opacity: .7; }

/* ── PAINEL DIREITO ── */
#profile-panel { width: 280px; min-width: 280px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 14px 12px; }
.profile-section h3 { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 8px; margin-top: 14px; }
.profile-section h3:first-child { margin-top: 0; }
.profile-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; gap: 8px; }
.profile-row .label { font-size: .75rem; color: var(--muted); flex-shrink: 0; }
.profile-row .value { font-size: .78rem; color: var(--text); text-align: right; word-break: break-word; }
.profile-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.resumo-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: .75rem; color: #94a3b8; line-height: 1.5; margin-top: 6px; }
.resumo-box .resumo-time { font-size: .65rem; color: var(--muted); margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: #00000088; display: flex; align-items: center; justify-content: center; z-index: 500; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 360px; }
.modal h2 { font-size: 1rem; margin-bottom: 1rem; }
.modal label { font-size: .8rem; color: var(--muted); display: block; margin-bottom: 3px; margin-top: 10px; }
.modal input, .modal select, .modal textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 7px; font-size: .85rem; font-family: inherit; }
.modal textarea { min-height: 60px; resize: vertical; }
.modal-btns { display: flex; gap: 8px; margin-top: 1rem; }
.btn-secondary { flex: 1; background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px; border-radius: 8px; cursor: pointer; font-size: .85rem; }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface2); color: var(--text); padding: 8px 18px; border-radius: 8px; font-size: .82rem; border: 1px solid var(--border); z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; }
#toast.show { opacity: 1; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  #sidebar { width: 100%; min-width: unset; display: none; }
  #sidebar.mobile-show { display: flex; position: fixed; inset: 0; z-index: 100; }
  #chat { width: 100%; }
  #profile-panel { display: none; }
  .header-stats { display: none; }
  #mobile-nav { display: flex; }
}
#mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); height: 54px; z-index: 200; }
.mob-btn { flex: 1; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
.mob-btn.active { color: var(--primary); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>🐾 Mari V3</h1>
    <p>Dashboard de supervisão</p>
    <input id="l-email" type="email" value="geta.hubcenter@gmail.com" placeholder="Email" />
    <div class="pass-wrap">
      <input id="l-senha" type="password" value="Plamev@2026" placeholder="Senha" />
      <button class="pass-eye" onclick="toggleSenha()" id="eye-btn">👁</button>
    </div>
    <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
    <div id="login-error"></div>
    <div class="login-hint">📧 geta.hubcenter@gmail.com &nbsp;·&nbsp; 🔑 Plamev@2026</div>
  </div>
</div>

<!-- APP -->
<header>
  <div class="header-left">
    <h1>🐾 Mari V3</h1>
    <div class="live-dot"></div>
  </div>
  <div class="header-stats">
    <span>👥 <strong id="s-clientes">—</strong> hoje</span>
    <span>💬 <strong id="s-msgs">—</strong> msgs</span>
    <span>🤖 $<strong id="s-custo">—</strong> hoje</span>
    <span>📅 $<strong id="s-mes">—</strong>/mês</span>
  </div>
  <button class="btn-logout" onclick="logout()">Sair</button>
</header>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      Conversas ativas
      <button class="btn-add" onclick="abrirNovoContato()" title="Novo contato">+</button>
    </div>
    <div id="conv-list"><div style="padding:1rem;color:var(--muted);font-size:.82rem">Carregando...</div></div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="chat-header">
      <div class="chat-header-info">
        <h2 id="chat-title">Selecione uma conversa</h2>
        <p id="chat-sub"></p>
      </div>
      <div class="chat-header-actions">
        <button class="btn-action" id="btn-silenciar" onclick="silenciar()">🔇 Silenciar</button>
        <button class="btn-action" onclick="abrirTransferir()">🔄 Transferir</button>
      </div>
    </div>
    <div id="chat-msgs"><div class="empty-chat"><div style="font-size:2rem">💬</div><div>Selecione uma conversa</div></div></div>
    <div id="chat-input-bar" style="display:none">
      <div class="chat-tabs">
        <button class="chat-tab active" onclick="mudarAba('mari',this)">🤖 Mari</button>
        <button class="chat-tab" onclick="mudarAba('direto',this)">💬 Direto</button>
        <button class="chat-tab" onclick="mudarAba('nota',this)">📝 Nota</button>
      </div>
      <div id="fd-preview"><div class="pre-label">✨ Mari vai enviar:</div><div id="fd-preview-txt"></div></div>
      <div class="chat-input-row">
        <textarea class="chat-inp" id="chat-inp" placeholder="Instrua a Mari..." rows="1"></textarea>
        <button class="btn-send" onclick="enviarAba()">Enviar</button>
      </div>
    </div>
  </div>

  <!-- PERFIL -->
  <div id="profile-panel">
    <div style="color:var(--muted);font-size:.82rem;padding-top:2rem;text-align:center">Selecione uma conversa</div>
  </div>
</div>

<!-- MOBILE NAV -->
<div id="mobile-nav">
  <button class="mob-btn active" onclick="mobTab('lista')">👥</button>
  <button class="mob-btn" onclick="mobTab('chat')">💬</button>
  <button class="mob-btn" onclick="mobTab('perfil')">👤</button>
</div>

<!-- MODAIS -->
<div class="modal-overlay hidden" id="modal-novo">
  <div class="modal">
    <h2>➕ Novo Contato</h2>
    <label>Nome</label>
    <input id="nc-nome" placeholder="Nome do cliente" />
    <label>WhatsApp</label>
    <input id="nc-phone" placeholder="5511999990000" />
    <label>Origem</label>
    <select id="nc-origem">
      <option value="manual">Manual</option>
      <option value="indicacao">Indicação</option>
      <option value="ads">Anúncio</option>
      <option value="organico">Orgânico</option>
    </select>
    <label>Histórico (opcional)</label>
    <textarea id="nc-hist" placeholder="Contexto da conversa..."></textarea>
    <label>Indicado por (opcional)</label>
    <input id="nc-indicado" placeholder="Nome de quem indicou" />
    <div class="modal-btns">
      <button class="btn-secondary" onclick="fecharModal('modal-novo')">Cancelar</button>
      <button class="btn-primary" onclick="criarContato()" style="flex:1">Criar e Iniciar</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-transferir">
  <div class="modal">
    <h2>🔄 Transferir Conversa</h2>
    <label>Agente destino</label>
    <select id="tr-agente">
      <option value="mari">Mari</option>
      <option value="rapha">Rapha</option>
    </select>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="fecharModal('modal-transferir')">Cancelar</button>
      <button class="btn-primary" onclick="transferir()" style="flex:1">Transferir</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Estado ────────────────────────────────────────────────────
let token = localStorage.getItem('v3_token') || null;
let socket = null;
let convAtiva = null;
let abaAtiva = 'mari';
let fdTimer = null;
let iaStatus = {};

// ── Auth ──────────────────────────────────────────────────────
function toggleSenha() {
  const inp = document.getElementById('l-senha');
  const btn = document.getElementById('eye-btn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

async function fazerLogin() {
  const email = document.getElementById('l-email').value;
  const senha = document.getElementById('l-senha').value;
  const err   = document.getElementById('login-error');
  err.textContent = '';
  try {
    const r = await fetch('/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,senha}) });
    const d = await r.json();
    if (!r.ok) return (err.textContent = d.erro || 'Erro ao entrar');
    token = d.token;
    localStorage.setItem('v3_token', token);
    iniciarApp();
  } catch(e) { err.textContent = 'Erro de conexão'; }
}

function logout() {
  localStorage.removeItem('v3_token');
  location.reload();
}

// ── App ───────────────────────────────────────────────────────
function iniciarApp() {
  document.getElementById('login-screen').style.display = 'none';
  socket = io({ auth: { token } });

  socket.on('connect', () => {
    socket.emit('get_conversas');
    socket.emit('get_stats');
  });

  socket.on('conversas_data', renderLista);
  socket.on('stats_data', renderStats);
  socket.on('conversa_data', renderConversa);
  socket.on('instrucao_ok', d => { toast('✅ '+d.msg.substring(0,50)); });
  socket.on('falar_direto_ok', d => { toast('✅ Enviado!'); });
  socket.on('fd_preview_ok', d => {
    if (d.msg) { document.getElementById('fd-preview-txt').textContent = d.msg; document.getElementById('fd-preview').style.display='block'; }
  });
  socket.on('nota_ok', () => toast('📝 Nota salva'));
  socket.on('excluir_ok', d => { toast('❌ '+d.nome+' excluído'); convAtiva=null; document.getElementById('chat-msgs').innerHTML='<div class="empty-chat"><div>Excluído</div></div>'; document.getElementById('chat-input-bar').style.display='none'; socket.emit('get_conversas'); });
  socket.on('excluir_dados_ok', () => { toast('🗑️ Dados limpos'); socket.emit('get_conversa', convAtiva?.id); });
  socket.on('transferido_ok', () => { toast('🔄 Transferido!'); socket.emit('get_conversas'); fecharModal('modal-transferir'); });
  socket.on('erro', d => toast('❌ '+d.msg, true));

  socket.on('nova_msg', data => {
    if (convAtiva?.id === data.conversa_id) {
      if (data.msg_cliente) addMsg({role:'user', conteudo:data.msg_cliente, timestamp:data.timestamp});
      if (data.msg_mari)    addMsg({role:'agent', conteudo:data.msg_mari, timestamp:data.timestamp});
      if (data.msg_supervisor) addMsg({role:'supervisor', conteudo:data.msg_supervisor, timestamp:data.timestamp});
    }
  });

  socket.on('conversa_atualizada', ({ conversa_id }) => {
    const card = document.querySelector(`[data-id="${conversa_id}"]`);
    if (!card) { socket.emit('get_conversas'); return; }
    // Piscar
    card.classList.remove('nova');
    void card.offsetWidth;
    card.classList.add('nova');
    card.addEventListener('animationend', () => card.classList.remove('nova'), {once:true});
    // Badge NOVO
    if (convAtiva?.id !== conversa_id) {
      const nome = card.querySelector('.card-nome');
      if (nome && !nome.querySelector('.novo-badge')) {
        const b = document.createElement('span');
        b.className='novo-badge'; b.textContent='NOVO';
        nome.appendChild(b);
      }
    }
    // Mover para topo
    const lista = card.parentNode;
    if (lista && lista.firstChild !== card) lista.insertBefore(card, lista.firstChild);
    // Atualizar tempo
    const t = card.querySelector('.card-tempo');
    if (t) t.textContent = 'agora';
  });

  // Stats a cada 30s
  setInterval(() => socket.emit('get_stats'), 30000);
}

// ── Render Lista ──────────────────────────────────────────────
function fmt(num) {
  if (!num) return '—';
  const n = String(num).replace(/\D/g,'');
  if (n.startsWith('55') && n.length >= 12) {
    const ddd=n.slice(2,4), rest=n.slice(4);
    if (rest.length===9) return '('+ddd+') '+rest.slice(0,5)+'-'+rest.slice(5);
    if (rest.length===8) return '('+ddd+') '+rest.slice(0,4)+'-'+rest.slice(4);
  }
  if (n.length>11) return '...'+n.slice(-8);
  return num;
}

function tempo(ts) {
  if (!ts) return '—';
  const d = Math.floor((Date.now()-new Date(ts))/60000);
  if (d<1) return 'agora';
  if (d<60) return d+'min';
  if (d<1440) return Math.floor(d/60)+'h';
  return Math.floor(d/1440)+'d';
}

function renderLista(rows) {
  const list = document.getElementById('conv-list');
  if (!rows.length) { list.innerHTML='<div style="padding:1rem;color:var(--muted);font-size:.82rem">Nenhuma conversa ativa</div>'; return; }
  list.innerHTML = rows.map(c => {
    const pet = [c.nome_pet, c.especie].filter(Boolean).join(' · ') || '—';
    const senderFmt = c.sender_chip ? fmt(c.sender_chip.replace(/@s\.whatsapp\.net|@c\.us/g,'')) : null;
    return `<div class="conv-card${convAtiva?.id===c.id?' active':''}" data-id="${c.id}" onclick="abrirConversa('${c.id}')">
      <div class="card-row1">
        <span class="card-nome">${esc(c.cliente_nome||'Cliente')}</span>
        <div style="display:flex;align-items:center;gap:5px">
          <button onclick="event.stopPropagation();cardProvocar('${c.id}')" title="Provocar" class="card-btn" style="width:26px;border:none;font-size:14px">⚡</button>
          <button onclick="event.stopPropagation();cardLimpar('${c.id}')" title="Limpar dados" class="card-btn" style="width:26px;border:none;font-size:14px">🗑️</button>
          <button onclick="event.stopPropagation();cardExcluir('${c.id}')" title="Excluir" class="card-btn danger" style="width:26px;border:none;font-size:14px">❌</button>
          <span class="card-tempo">${tempo(c.ultima_interacao)}</span>
        </div>
      </div>
      <div class="card-row2">${esc(pet)}</div>
      <div class="card-row3" style="justify-content:space-between">
        <span>📞 <strong style="color:#e2e8f0">${fmt(c.numero_externo)}</strong></span>
        <span style="color:#475569;font-size:.68rem">${senderFmt || ''}</span>
      </div>
      <div class="card-row3">
        <span class="card-chip">${esc(c.chip||c.canal)}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Abrir Conversa ────────────────────────────────────────────
function abrirConversa(id) {
  document.querySelectorAll('.conv-card').forEach(c=>c.classList.remove('active'));
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) {
    card.classList.add('active');
    const badge = card.querySelector('.novo-badge');
    if (badge) badge.remove();
  }
  socket.emit('get_conversa', id);
  document.getElementById('chat-input-bar').style.display='block';
}

function renderConversa(data) {
  convAtiva = data.conversa;
  const c = data.conversa || {};
  const p = data.perfil   || {};
  const msgs = data.mensagens || [];

  // Header
  // Mostrar pushName (nome do chip) primeiro, depois nome fornecido
  const nomeExibir = p.nome_cliente && p.nome_cliente !== c.numero_externo ? p.nome_cliente : (c.numero_externo || 'Cliente');
  document.getElementById('chat-title').textContent = nomeExibir;
  document.getElementById('chat-sub').textContent   = (p.nome_pet ? p.nome_pet+' · ' : '') + (c.etapa||'') + (c.numero_cotacao ? ' · '+c.numero_cotacao : '');

  // Silenciar btn
  const btnSil = document.getElementById('btn-silenciar');
  btnSil.textContent = c.ia_silenciada ? '🔊 Ativar IA' : '🔇 Silenciar';

  // Msgs
  const box = document.getElementById('chat-msgs');
  box.innerHTML = '';
  msgs.forEach(m => addMsg(m, false));
  box.scrollTop = box.scrollHeight;

  // Perfil
  renderPerfil(p, c);
}

function addMsg(m, scroll=true) {
  const box = document.getElementById('chat-msgs');
  const wrap = document.createElement('div');
  wrap.style.display='flex';
  wrap.style.flexDirection='column';
  wrap.style.alignItems = m.role==='user' ? 'flex-end' : 'flex-start';

  const div = document.createElement('div');
  div.className = 'msg '+(m.role==='user'?'user':m.role==='supervisor'?'supervisor':'agent');
  div.textContent = m.conteudo || m.content || '';

  const t = document.createElement('div');
  t.className='msg-time';
  t.textContent = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';

  wrap.appendChild(div);
  wrap.appendChild(t);
  box.appendChild(wrap);
  if (scroll) box.scrollTop = box.scrollHeight;
}

// ── Perfil ────────────────────────────────────────────────────
function lin(label, val) {
  if (val===null||val===undefined||val==='') return '';
  return `<div class="profile-row"><span class="label">${label}</span><span class="value">${esc(String(val))}</span></div>`;
}

function renderPerfil(p, c) {
  const panel = document.getElementById('profile-panel');
  const senderFmt = c?.sender_chip ? fmt(c.sender_chip.replace(/@s\.whatsapp\.net|@c\.us/g,'')) : null;
  const idadeFmt  = p?.idade_anos  ? String(p.idade_anos).replace('.0','') + ' anos' : null;

  panel.innerHTML = `
    <div class="profile-section">
      <h3>👤 Cliente</h3>
      ${lin('Nome',        p?.nome_cliente)}
      ${lin('Telefone',    fmt(c?.numero_externo))}
      ${lin('Entrou pelo', senderFmt)}
      ${lin('Email',       p?.email)}
      ${lin('CPF',         p?.cpf)}
      ${lin('Origem',      p?.origem)}
      ${lin('Indicado por',p?.indicado_por)}
    </div>
    <hr class="profile-divider"/>
    <div class="profile-section">
      <h3>🐾 Pet</h3>
      ${lin('Nome',     p?.nome_pet)}
      ${lin('Espécie',  p?.especie)}
      ${lin('Raça',     p?.raca)}
      ${lin('Idade',    idadeFmt)}
      ${lin('Sexo',     p?.sexo)}
      ${lin('Castrado', p?.castrado===true?'Sim':p?.castrado===false?'Não':null)}
      ${lin('Problema', p?.problema_saude)}
    </div>
    <hr class="profile-divider"/>
    <div class="profile-section">
      <h3>📍 Localização</h3>
      ${lin('CEP',    p?.cep)}
      ${lin('Cidade', p?.cidade)}
      ${lin('Estado', p?.estado)}
    </div>
    <hr class="profile-divider"/>
    <div class="profile-section">
      <h3>📊 Conversa</h3>
      ${lin('Etapa',      c?.etapa)}
      ${lin('Score',      c?.score!==undefined ? c.score+'/10' : null)}
      ${lin('Cotação',    c?.numero_cotacao)}
      ${lin('Chip',       c?.chip)}
      ${lin('Agente',     c?.agente_nome)}
      ${lin('1º contato', c?.criado_em ? new Date(c.criado_em).toLocaleDateString('pt-BR') : null)}
    </div>
    <hr class="profile-divider"/>
    <div class="profile-section">
      <h3>📝 Resumo</h3>
      <div class="resumo-box">
        ${c?.resumo_conversa ? esc(c.resumo_conversa) : '<span style="color:var(--muted)">Gerando resumo...</span>'}
        ${c?.resumo_atualizado_em ? '<div class="resumo-time">Atualizado: '+new Date(c.resumo_atualizado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div>' : ''}
      </div>
    </div>`;
}

// ── Stats ─────────────────────────────────────────────────────
function renderStats(d) {
  document.getElementById('s-clientes').textContent = d.clientes_hoje||0;
  document.getElementById('s-msgs').textContent     = d.msgs_hoje||0;
  document.getElementById('s-custo').textContent    = d.custo_hoje||'0.0000';
  document.getElementById('s-mes').textContent      = d.custo_mes||'0.00';
}

// ── Aba do chat ───────────────────────────────────────────────
function mudarAba(aba, btn) {
  abaAtiva = aba;
  document.querySelectorAll('.chat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const inp = document.getElementById('chat-inp');
  const fd  = document.getElementById('fd-preview');
  fd.style.display='none';
  if (aba==='mari')  inp.placeholder = 'Instrua a Mari...';
  if (aba==='direto') inp.placeholder = 'Digite sua mensagem (Mari reescreve)...';
  if (aba==='nota')  inp.placeholder = 'Nota interna (não enviada ao cliente)...';
}

function enviarAba() {
  if (!convAtiva) return toast('Selecione uma conversa', true);
  const inp  = document.getElementById('chat-inp');
  const txt  = inp.value.trim();
  if (!txt) return;
  inp.value  = '';
  document.getElementById('fd-preview').style.display='none';

  if (abaAtiva==='mari')   socket.emit('instrucao',    { conversa_id: convAtiva.id, texto: txt });
  if (abaAtiva==='direto') socket.emit('falar_direto', { conversa_id: convAtiva.id, texto: txt, reescrever: true });
  if (abaAtiva==='nota')   socket.emit('salvar_nota',  { conversa_id: convAtiva.id, texto: txt });
}

// Preview em tempo real para aba Direto
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('chat-inp').addEventListener('input', function() {
    if (abaAtiva!=='direto' || !convAtiva) return;
    clearTimeout(fdTimer);
    const txt = this.value.trim();
    if (!txt) { document.getElementById('fd-preview').style.display='none'; return; }
    fdTimer = setTimeout(() => socket.emit('fd_preview', { conversa_id: convAtiva.id, texto: txt }), 900);
  });
});

// ── Ações do card ─────────────────────────────────────────────
function cardProvocar(id)  { socket.emit('provocar', { conversa_id: id }); toast('⚡ Provocando...'); }
function cardLimpar(id)    { if (!confirm('Limpar dados desta conversa?')) return; socket.emit('excluir_dados', { conversa_id: id }); }
function cardExcluir(id)   { if (!confirm('Excluir este contato permanentemente?')) return; socket.emit('excluir_contato', { conversa_id: id }); }

// ── Ações do header do chat ───────────────────────────────────
function silenciar() {
  if (!convAtiva) return;
  socket.emit('silenciar_ia', convAtiva.id);
}

function abrirTransferir() {
  if (!convAtiva) return toast('Selecione uma conversa', true);
  document.getElementById('modal-transferir').classList.remove('hidden');
}

function transferir() {
  const agente = document.getElementById('tr-agente').value;
  socket.emit('transferir', { conversa_id: convAtiva.id, agent_slug: agente });
}

// ── Novo contato ──────────────────────────────────────────────
function abrirNovoContato() {
  document.getElementById('modal-novo').classList.remove('hidden');
  document.getElementById('nc-nome').focus();
}

function criarContato() {
  const nome     = document.getElementById('nc-nome').value.trim();
  const phone    = document.getElementById('nc-phone').value.trim().replace(/\D/g,'');
  const origem   = document.getElementById('nc-origem').value;
  const hist     = document.getElementById('nc-hist').value.trim();
  const indicado = document.getElementById('nc-indicado').value.trim();
  if (!nome || !phone) return toast('Nome e telefone obrigatórios', true);
  socket.emit('novo_contato', { nome, phone, origem, historico: hist, indicado_por: indicado });
  fecharModal('modal-novo');
  ['nc-nome','nc-phone','nc-hist','nc-indicado'].forEach(id => document.getElementById(id).value='');
  toast('✅ Criando contato...');
}

// ── Utils ─────────────────────────────────────────────────────
function fecharModal(id) { document.getElementById(id).classList.add('hidden'); }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = err ? 'var(--red)' : 'var(--border)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── Mobile ────────────────────────────────────────────────────
function mobTab(tab) {
  document.querySelectorAll('.mob-btn').forEach((b,i)=>b.classList.toggle('active',['lista','chat','perfil'][i]===tab));
  document.getElementById('sidebar').classList.toggle('mobile-show', tab==='lista');
  document.getElementById('chat').style.display = tab==='lista'?'none':'flex';
  document.getElementById('profile-panel').style.display = tab==='perfil'?'block':'none';
}

// ── Auto-iniciar se tiver token ───────────────────────────────
if (token) iniciarApp();
</script>
</body>
</html>
