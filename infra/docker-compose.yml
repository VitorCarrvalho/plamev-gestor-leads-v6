version: '3.8'
services:
  postgres:
    image: ankane/pgvector:latest
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: geta
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mariv3
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
